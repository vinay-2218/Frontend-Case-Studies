<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare  - Clinic Management System</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div id="loginbox">
        <h2>Login to HealthCare Clinic</h2>
        <form id="loginform">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br>
            <a href="#forgotpassword.html" id="forgotpassword">Forgot Password?</a><br>
            <button type="button" id="loginbutton" onclick="validate()">Login</button><br>
            <p> don't have a account?<a href="#signup/signup.html" id="loginbutton">signup</a></p>
        </form>
    </div>
</body>
    

<script src="login.js"></script>
</html>
