<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare  - Clinic Management System</title>
    <link rel="stylesheet" href="singup.css">
</head>
<body>
    <div id="loginbox">
        <h2>Signin to HealthCare Clinic</h2>
        <form id="loginform">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br>
            <label for="confirm">Confirm Password:</label>
            <input type="password" id="confirm" name="confirm" required><br>
            <button type="button" id="loginbutton">Signin</button><br>
            <p> did already have a account?<a href="#login\login.html" id="loginbutton">login</a></p>
        </form>
    </div>
</body>
    

<script src="singup.js"></script>
</html>
