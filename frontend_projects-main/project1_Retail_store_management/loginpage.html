<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- SAME CSS – no changes -->
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            margin-top: 100px;
            background-color: aliceblue;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #login{
            width: 450px;
            justify-content: center;
            box-shadow: 5px 5px 10px 10px #6a228000;
        }
        #loginbox{
            background: #fff;
            padding: 30px;
            width: 420px;
            height: 350px;
            border-radius: 12px;
            display: inline-block;
            text-align: center;
        }
        .head{
            text-align: center;
            margin-bottom: 2px;
        }
        .input{
            height: 40px;
            width: 350px;
            margin: 10px;
            text-align: center;
            background-color: rgba(161, 161, 163, 0.067);
            border-radius: 35px;
        }
        #signup{
            align-items: center;
            height: 40px;
            width: 190px;
        }
    </style>
</head>

<body>

<main id="login">
    <section id="loginbox">

        <h1 class="head">Login</h1>

        <form class="loginbox">

            <div>
                <input id="email" class="input" type="email"
                       placeholder="Enter Your Email" required>
            </div>

            <div>
                <input id="password" class="input" type="password"
                       placeholder="Enter Password" required>
            </div>

            <div>
                <button type="button" onclick="Check()" id="signup" class="input">
                    Login
                </button><br>

                <a href="signup.html" id="loginlink">dind't have a account yet?</a>
            </div>

        </form>

    </section>
</main>

<script>
    function Check(){
        if(Validate()){
            window.location.href = "index.html";
        }
        else{
            alert("invalid email/password")
        }
    }

    function Validate(){
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        if(email==="vmahamadhbasha@gmail.com" && password==="123"){

            return true;
        }

        return false;
    }
</script>

</body>
</html>
